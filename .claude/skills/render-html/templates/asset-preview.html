<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Marketing AI System</title>
  <style>{{ styles }}
    /* Asset-preview right-panel layout (codified 2026-06-04 per operator direction:
       "any questions and next steps go in the right hand panel, not the asset area") */
    .asset-preview-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 40px;
      align-items: start;
      max-width: var(--max-width-wide, 1480px);
      margin: 0 auto;
      padding: 24px 32px 80px;
    }
    @media (max-width: 1100px) {
      .asset-preview-layout { grid-template-columns: 1fr; gap: 24px; padding: 24px 20px 60px; }
      .asset-preview-layout__aside { position: static !important; max-height: none !important; }
    }
    .asset-preview-layout__main { min-width: 0; }
    .asset-preview-layout__aside {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 20px 22px;
      font-size: 13px;
      line-height: 1.55;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .asset-preview-layout__aside:empty { display: none; }
    .operator-panels-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c2410c;
      margin: 0 0 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #fed7aa;
    }
    .operator-panel { margin: 0 0 22px 0; }
    .operator-panel:last-child { margin-bottom: 0; }
    .operator-panel__heading {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text, #18181b);
      margin: 0 0 10px;
      line-height: 1.35;
    }
    .operator-panel__icon { margin-right: 6px; }
    .operator-panel__body { color: var(--text, #18181b); }
    .operator-panel__body p { margin: 0 0 8px; }
    .operator-panel__body ol { margin: 0; padding-left: 20px; }
    .operator-panel__body ul { margin: 0; padding-left: 20px; }
    .operator-panel__body li { margin: 0 0 8px; }
    .operator-panel__body strong { font-weight: 600; }
    .operator-panel__body code { font-size: 12px; background: rgba(255,255,255,0.6); padding: 1px 5px; border-radius: 3px; }
    .operator-panel__body em { color: var(--text-subtle, #71717a); font-style: italic; }
    .operator-panel--questions { border-left: 3px solid #ea580c; padding-left: 12px; }
    .operator-panel--next-steps { border-left: 3px solid #16a34a; padding-left: 12px; }
    .operator-panel--next-steps .operator-panel__heading { color: #15803d; }
    /* Edit-copy quick-action button (top of right panel when sibling copy.md exists) */
    .operator-quick-actions { margin: 0 0 18px 0; padding-bottom: 14px; border-bottom: 1px solid #fed7aa; }
    .quick-action {
      display: flex; flex-direction: column; gap: 2px;
      padding: 10px 14px; border-radius: 8px;
      background: #fed7aa; color: #7c2d12; text-decoration: none;
      transition: background 0.15s ease;
    }
    .quick-action:hover { background: #fdba74; }
    .quick-action__icon { font-size: 18px; line-height: 1; margin-bottom: 2px; }
    .quick-action__label { font-weight: 600; font-size: 13.5px; }
    .quick-action__hint { font-size: 11px; color: #9a3412; opacity: 0.85; }
    .quick-action--primary { /* reserved for future variants */ }
  </style>
</head>
<body class="template-{{ template_name }}">
  <header class="page-header">
    <div class="page-header__inner">
      <nav class="breadcrumb" aria-label="Breadcrumb">{{ breadcrumb }}</nav>
      <div class="page-header__right">
        {{ library_nav }}
        <button type="button" class="refresh-btn" onclick="location.reload()" title="Refresh this page" aria-label="Refresh">&#10227;</button>
        <span class="page-header__template" aria-hidden="true">{{ template_name }}</span>
      </div>
    </div>
  </header>

  <main class="page-main page-main--asset-preview">
    <div class="asset-preview-layout">
      <div class="asset-preview-layout__main">
        <section class="mockups" aria-label="In-situ mockups">
          {{ mockups }}
        </section>

        <article class="content content--narrative">
          {{ body }}
        </article>
      </div>

      <aside class="asset-preview-layout__aside" aria-label="Operator actions">
        {{ operator_panels }}
      </aside>
    </div>
  </main>

  <footer class="page-footer">
    <span>Source: <code>{{ source_path }}</code> · Markdown is authoritative · Re-rendered on CM's next invocation</span>
  </footer>
</body>
</html>
